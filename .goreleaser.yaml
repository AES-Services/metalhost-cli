version: 2

project_name: metalhost

before:
  hooks:
    - go mod tidy

builds:
  - id: metalhost
    main: ./cmd/metalhost
    binary: metalhost
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
      - arm
      - "386"
    goarm:
      - "7"
    ignore:
      - goos: darwin
        goarch: arm
      - goos: darwin
        goarch: "386"
      - goos: windows
        goarch: arm
    ldflags:
      - -s -w
      - -X github.com/AES-Services/metalhost-cli/internal/version.Version={{ .Version }}
      - -X github.com/AES-Services/metalhost-cli/internal/version.Commit={{ .Commit }}
      - -X github.com/AES-Services/metalhost-cli/internal/version.Date={{ .Date }}

archives:
  - id: metalhost
    ids:
      - metalhost
    formats:
      - tar.gz
    format_overrides:
      - goos: windows
        formats:
          - zip
    name_template: >-
      {{ .ProjectName }}_
      {{- .Version }}_
      {{- .Os }}_
      {{- if eq .Arch "amd64" }}x86_64
      {{- else if eq .Arch "386" }}i386
      {{- else }}{{ .Arch }}{{ end }}
      {{- if .Arm }}v{{ .Arm }}{{ end }}
    files:
      - LICENSE
      - README.md

checksum:
  name_template: checksums.txt

snapshot:
  version_template: "{{ incpatch .Version }}-next"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"

release:
  github:
    owner: AES-Services
    name: metalhost-cli
  draft: false
  prerelease: auto
